<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Coway Dashboard Monitor</title>
  <link rel="icon" type="image/png" href="coway-logo.png">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Sora:wght@300;500;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --blue: #2C6FA0;
      --blue-dark: #1F5580;
      --accent: #7db8f0;
      --dark: #0d1117;
      --panel: #111827;
      --border: #1e2d40;
      --muted: #4b6484;
      --header-h: 36px;
      --bar-h: 28px;
    }

    html, body {
      width: 100%;
      height: 100dvh;
      overflow: hidden;
      background: var(--dark);
      font-family: 'Sora', sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    /* ═══════════════════════════════════════════════════ */
    /* ── TIER 1: WHITE BRANDING HEADER ── */
    /* ═══════════════════════════════════════════════════ */
    .header {
      height: var(--header-h);
      min-height: var(--header-h);
      flex-shrink: 0;
      background: white;
      border-bottom: 1px solid #e5e7eb;
      padding: 0 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .brand-logo {
      height: 16px;
      width: auto;
      display: block;
    }

    .brand-title {
      color: #111827;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: -0.2px;
      font-family: 'Sora', sans-serif;
    }

    .brand-badge {
      padding: 2px 6px;
      background: #E6F1FB;
      color: #0C447C;
      border-radius: 3px;
      font-size: 8.5px;
      font-weight: 600;
      letter-spacing: 0.8px;
      font-family: 'JetBrains Mono', monospace;
    }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .version-badge {
      padding: 2px 7px;
      background: #f3f4f6;
      color: #6b7280;
      border-radius: 4px;
      font-size: 9.5px;
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
    }

    .contact-link {
      display: flex;
      align-items: center;
      gap: 5px;
      color: #6b7280;
      font-size: 11px;
      text-decoration: none;
      transition: color 0.15s ease;
      font-family: 'Sora', sans-serif;
    }
    .contact-link:hover {
      color: var(--blue);
    }
    .contact-link svg {
      width: 11px;
      height: 11px;
    }

    .divider-light {
      width: 1px;
      height: 14px;
      background: #e5e7eb;
      flex-shrink: 0;
    }

    /* ═══════════════════════════════════════════════════ */
    /* ── TIER 2: DARK MONITOR BAR ── */
    /* ═══════════════════════════════════════════════════ */
    .topbar {
      height: var(--bar-h);
      min-height: var(--bar-h);
      flex-shrink: 0;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      gap: 12px;
      overflow: visible;
      position: relative;
      z-index: 20;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      min-width: 0;
    }

    .brand-dark {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .dot {
      width: 7px;
      height: 7px;
      flex-shrink: 0;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 6px #22c55e;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    .label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* ── SEGMENTED DASHBOARD SWITCHER (LIGHT VERSION) ── */
    .switcher {
      display: flex;
      align-items: center;
      gap: 2px;
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
      border-radius: 5px;
      padding: 2px;
      height: 22px;
    }

    .switcher-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      height: 100%;
      padding: 0 10px;
      background: transparent;
      border: none;
      border-radius: 3px;
      color: #6b7280;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9.5px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
      white-space: nowrap;
    }

    .switcher-btn:hover:not(.active) {
      color: #374151;
      background: rgba(0, 0, 0, 0.04);
    }

    .switcher-btn.active {
      background: white;
      color: var(--blue);
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
    }

    .switcher-btn svg {
      width: 11px;
      height: 11px;
      flex-shrink: 0;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 14px;
      overflow: visible;
    }

    .info-block {
      display: flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }

    .info-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .info-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--accent);
      font-weight: 600;
    }

    .countdown {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--accent);
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .divider {
      width: 1px;
      height: 14px;
      background: var(--border);
      flex-shrink: 0;
    }

    /* Responsive */
    @media (max-width: 900px) {
      .hide-md { display: none !important; }
      .switcher-btn .switcher-label { display: none; }
      .switcher-btn { padding: 0 8px; }
      .header { padding: 0 14px; gap: 12px; }
      .brand-title { display: none; }
    }
    @media (max-width: 700px) {
      .hide-sm { display: none !important; }
    }
    @media (max-width: 500px) {
      .hide-xs { display: none !important; }
      .label { display: none; }
      .contact-link span { display: none; }
      .version-badge { display: none; }
    }

    /* ── DOWNLOAD BUTTON + DROPDOWN ── */
    .download-wrap {
      position: relative;
      flex-shrink: 0;
    }

    .download-wrap.hidden {
      display: none;
    }

    .download-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      height: 20px;
      padding: 0 10px;
      background: rgba(125, 184, 240, 0.08);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--accent);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
      white-space: nowrap;
    }

    .download-btn:hover {
      background: rgba(125, 184, 240, 0.18);
      border-color: #2a4a6a;
    }

    .download-btn.open {
      background: rgba(125, 184, 240, 0.22);
      border-color: #2a4a6a;
    }

    .download-btn svg {
      width: 11px;
      height: 11px;
      flex-shrink: 0;
    }

    .chevron {
      width: 8px;
      height: 8px;
      opacity: 0.7;
      transition: transform 0.15s ease;
    }

    .download-btn.open .chevron {
      transform: rotate(180deg);
    }

    .dropdown {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      min-width: 200px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
      opacity: 0;
      visibility: hidden;
      transform: translateY(-4px);
      transition: opacity 0.15s ease, transform 0.15s ease, visibility 0.15s;
      z-index: 100;
      overflow: hidden;
    }

    .dropdown.open {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .dropdown-header {
      padding: 8px 12px 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 8.5px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-bottom: 1px solid var(--border);
    }

    .dropdown-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      font-family: 'Sora', sans-serif;
      font-size: 11px;
      color: #b0c4dc;
      cursor: pointer;
      transition: background 0.1s ease, color 0.1s ease;
      border-bottom: 1px solid #1a2535;
    }

    .dropdown-item:last-child {
      border-bottom: none;
    }

    .dropdown-item:hover {
      background: rgba(125, 184, 240, 0.1);
      color: #e0eaf5;
    }

    .dropdown-item svg {
      width: 12px;
      height: 12px;
      color: var(--accent);
      flex-shrink: 0;
    }

    .dropdown-item-label {
      flex: 1;
    }

    /* ── IFRAME WRAPPER ── */
    .iframe-wrap {
      flex: 1 1 0;
      min-height: 0;
      position: relative;
      overflow: hidden;
      background: var(--dark);
      height: calc(100dvh - var(--header-h) - var(--bar-h));
    }

    iframe {
      border: none;
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      transform-origin: top left;
      will-change: transform;
    }

    /* ── FLASH OVERLAY ── */
    .flash {
      position: absolute;
      inset: 0;
      background: #0d1117;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s ease;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .flash.show {
      opacity: 1;
      pointer-events: all;
    }

    .flash-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: #2a4a6a;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.4s ease 0.3s;
    }

    .flash.show .flash-text {
      opacity: 1;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-left: 3px solid #22c55e;
      border-radius: 4px;
      padding: 10px 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: #b0c4dc;
      letter-spacing: 0.05em;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.25s ease, transform 0.25s ease;
      pointer-events: none;
      z-index: 200;
      max-width: 280px;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- TIER 1: WHITE BRANDING HEADER -->
  <!-- ═══════════════════════════════════════════════════ -->
  <header class="header">
    <div class="brand">
      <svg class="brand-logo" viewBox="0 0 200 56" xmlns="http://www.w3.org/2000/svg" aria-label="Coway">
        <text x="0" y="44" font-family="Sora, -apple-system, sans-serif" font-size="52" font-weight="700" fill="#00ADE4" letter-spacing="-2">coway</text>

    </div>

    <div class="divider-light hide-xs"></div>

    <div class="switcher" role="tablist" aria-label="Select dashboard">
      <button class="switcher-btn active" data-dashboard="instalasi" role="tab" aria-selected="true" type="button">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="5" height="5"/>
          <rect x="9" y="2" width="5" height="5"/>
          <rect x="2" y="9" width="5" height="5"/>

        </svg>

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>

        <span>Report issue</span>
      </a>
    </div>
  </header>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- TIER 2: DARK MONITOR BAR -->
  <!-- ═══════════════════════════════════════════════════ -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="brand-dark">
        <div class="dot"></div>
        <span class="label">Live Monitor · <span id="current-dashboard-name">Instalasi</span></span>
      </div>
    </div>

    <div class="topbar-right">
      <div class="info-block hide-sm">
        <span class="info-label">Last Refreshed</span>
        <span class="info-value" id="last-refreshed">—</span>
      </div>

      <div class="divider hide-sm"></div>

      <div class="info-block hide-md">
        <span class="info-label">Next Refresh</span>
        <span class="info-value" id="next-refresh">—</span>
      </div>

      <div class="divider hide-md"></div>

      <div class="info-block">
        <span class="info-label">Refresh In</span>
        <span class="countdown" id="countdown">—</span>
      </div>

      <div class="divider"></div>

      <div class="download-wrap" id="download-wrap">
        <button class="download-btn" id="download-btn" type="button" aria-haspopup="true" aria-expanded="false">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 2v9"/>
            <path d="M4 7l4 4 4-4"/>
            <path d="M2 13h12"/>
          </svg>
          <span class="hide-sm">Save Image</span>
          <svg class="chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 6l4 4 4-4"/>
          </svg>
        </button>

        <div class="dropdown" id="dropdown" role="menu">
          <div class="dropdown-header">Choose Dashboard Page</div>

          <div class="dropdown-item" data-file-id="1swG4_2QMroSOPH-AqqM6ARfmCIa3lZXK" data-filename="installation_task_latest.png" role="menuitem" tabindex="0">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="3" width="12" height="10" rx="1"/>
              <path d="M2 7h12"/>
              <path d="M6 3v10"/>
            </svg>
            <span class="dropdown-item-label">Installation Task</span>
          </div>

          <div class="dropdown-item" data-file-id="1Bk8SbxZcCLqocoom4qWuy05w2i3sveVq" data-filename="sales_order_latest.png" role="menuitem" tabindex="0">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 4h10l-1 8H4L3 4z"/>
              <path d="M6 4V2h4v2"/>
            </svg>
            <span class="dropdown-item-label">Sales Order</span>
          </div>

          <div class="dropdown-item" data-file-id="1KmSDhxLuPgUqpRCDkhKhRqniipgxrJhr" data-filename="comparison_status_latest.png" role="menuitem" tabindex="0">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 13V7"/>
              <path d="M8 13V3"/>
              <path d="M13 13V9"/>
            </svg>
            <span class="dropdown-item-label">Comparison Status</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- IFRAME AREA -->
  <!-- ═══════════════════════════════════════════════════ -->
  <div class="iframe-wrap" id="iframe-wrap">
    <div class="flash" id="flash">
      <span class="flash-text">Loading dashboard...</span>
    </div>
    <iframe
      id="dashboard"
      src="https://lookerstudio.google.com/embed/reporting/b50b4471-1e49-4ca4-9762-9e9255dcd3e9/page/H8JrF"
      frameborder="0"
      style="border:0"
      allowfullscreen
      sandbox="allow-storage-access-by-user-activation allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox"
    ></iframe>
  </div>

  <div class="toast" id="toast">Downloading…</div>

  <script>
    const DASHBOARD_WIDTH  = 1220;
    const DASHBOARD_HEIGHT = 775;
    const DASHBOARD_RATIO  = DASHBOARD_WIDTH / DASHBOARD_HEIGHT;

    const DASHBOARDS = {
      instalasi: {
        name: 'Instalasi',
        url: 'https://lookerstudio.google.com/embed/reporting/b50b4471-1e49-4ca4-9762-9e9255dcd3e9/page/H8JrF',
        hasDownloads: true
      },
      as: {
        name: 'AS/BS/PR/PX',
        url: 'https://lookerstudio.google.com/embed/reporting/578bf145-05f2-41ca-91bc-bfced603aeca/page/p_z333glfq2d',
        hasDownloads: false
      }
    };

    const iframe      = document.getElementById('dashboard');
    const flashEl     = document.getElementById('flash');
    const wrapEl      = document.getElementById('iframe-wrap');
    const lastEl      = document.getElementById('last-refreshed');
    const nextEl      = document.getElementById('next-refresh');
    const countdownEl = document.getElementById('countdown');
    const downloadWrap = document.getElementById('download-wrap');
    const switcherBtns = document.querySelectorAll('.switcher-btn');
    const currentDashboardNameEl = document.getElementById('current-dashboard-name');

    let currentDashboard = 'instalasi';
    let refreshTimer = null;

    function scaleIframe() {
      const rect  = wrapEl.getBoundingClientRect();
      const wrapW = rect.width;
      const wrapH = rect.height;

      if (wrapW === 0 || wrapH === 0) return;

      const wrapRatio = wrapW / wrapH;

      let scale;
      if (wrapRatio > DASHBOARD_RATIO) {
        scale = wrapH / DASHBOARD_HEIGHT;
      } else {
        scale = wrapW / DASHBOARD_WIDTH;
      }

      const scaledW = DASHBOARD_WIDTH  * scale;
      const scaledH = DASHBOARD_HEIGHT * scale;

      const offsetX = (wrapW - scaledW) / 2;
      const offsetY = (wrapH - scaledH) / 2;

      iframe.style.width     = DASHBOARD_WIDTH  + 'px';
      iframe.style.height    = DASHBOARD_HEIGHT + 'px';
      iframe.style.transform =
        `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
    }

    const ro = new ResizeObserver(() => scaleIframe());
    ro.observe(wrapEl);
    window.addEventListener('resize', scaleIframe);

    iframe.addEventListener('load', () => {
      setTimeout(() => {
        flashEl.classList.remove('show');
        scaleIframe();
      }, 500);
    });

    function switchDashboard(key, { updateHash = true, forceReload = false } = {}) {
      if (!DASHBOARDS[key]) return;

      const isSameDashboard = (key === currentDashboard);
      const config = DASHBOARDS[key];

      currentDashboard = key;

      switcherBtns.forEach(btn => {
        const isActive = btn.dataset.dashboard === key;
        btn.classList.toggle('active', isActive);
        btn.setAttribute('aria-selected', isActive ? 'true' : 'false');
      });

      // Update the dashboard name shown in the dark monitor bar
      if (currentDashboardNameEl) {
        currentDashboardNameEl.textContent = config.name;
      }

      if (config.hasDownloads) {
        downloadWrap.classList.remove('hidden');
      } else {
        downloadWrap.classList.add('hidden');
        closeDropdown();
      }

      if (!isSameDashboard || forceReload) {
        flashEl.classList.add('show');
        setTimeout(() => {
          iframe.src = config.url;
          lastEl.textContent = fmt(new Date());
        }, 400);

        nextRefreshTime = getNextRefreshTime();
        if (refreshTimer) clearTimeout(refreshTimer);
        scheduleNext();
      }

      if (updateHash) {
        const hashMap = { instalasi: 'instalasi', as: 'as-bs-pr-px' };
        const newHash = hashMap[key] || key;
        if (window.location.hash.slice(1) !== newHash) {
          history.replaceState(null, '', '#' + newHash);
        }
      }

      document.title = `${config.name} · Coway Live Monitor`;
    }

    switcherBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        switchDashboard(btn.dataset.dashboard);
      });
    });

    function initDashboardFromHash() {
      const hash = window.location.hash.slice(1);
      const hashMap = { 'instalasi': 'instalasi', 'as-bs-pr-px': 'as' };
      const key = hashMap[hash] || 'instalasi';

      if (key === 'instalasi') {
        switchDashboard('instalasi', { updateHash: false });
      } else {
        switchDashboard(key, { updateHash: false, forceReload: true });
      }
    }

    window.addEventListener('hashchange', () => {
      const hash = window.location.hash.slice(1);
      const hashMap = { 'instalasi': 'instalasi', 'as-bs-pr-px': 'as' };
      const key = hashMap[hash] || 'instalasi';
      if (key !== currentDashboard) {
        switchDashboard(key, { updateHash: false });
      }
    });

    const downloadBtn = document.getElementById('download-btn');
    const dropdown    = document.getElementById('dropdown');
    const toast       = document.getElementById('toast');

    function openDropdown() {
      dropdown.classList.add('open');
      downloadBtn.classList.add('open');
      downloadBtn.setAttribute('aria-expanded', 'true');
    }

    function closeDropdown() {
      dropdown.classList.remove('open');
      downloadBtn.classList.remove('open');
      downloadBtn.setAttribute('aria-expanded', 'false');
    }

    function toggleDropdown() {
      if (dropdown.classList.contains('open')) {
        closeDropdown();
      } else {
        openDropdown();
      }
    }

    downloadBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleDropdown();
    });

    document.addEventListener('click', (e) => {
      if (!downloadWrap.contains(e.target)) {
        closeDropdown();
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeDropdown();
    });

    let toastTimer = null;
    function showToast(message, durationMs = 2500) {
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toast.classList.remove('show');
      }, durationMs);
    }

    function downloadFromDrive(fileId, filename) {
      const url = `https://drive.google.com/uc?export=download&id=${fileId}`;
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    document.querySelectorAll('.dropdown-item').forEach(item => {
      item.addEventListener('click', () => {
        const fileId   = item.dataset.fileId;
        const filename = item.dataset.filename;
        const label    = item.querySelector('.dropdown-item-label').textContent;

        downloadFromDrive(fileId, filename);
        showToast(`Downloading ${label}…`);
        closeDropdown();
      });

      item.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          item.click();
        }
      });
    });

    function fmt(date) {
      return date.toLocaleTimeString('id-ID', {
        hour: '2-digit', minute: '2-digit', second: '2-digit'
      });
    }

    function getNextRefreshTime() {
      const now  = new Date();
      const next = new Date(now);
      const m    = now.getMinutes();

      if (m < 10) {
        next.setMinutes(10, 0, 0);
      } else if (m < 40) {
        next.setMinutes(40, 0, 0);
      } else {
        next.setHours(next.getHours() + 1);
        next.setMinutes(10, 0, 0);
      }
      return next;
    }

    let nextRefreshTime = getNextRefreshTime();

    function doRefresh() {
      flashEl.classList.add('show');

      setTimeout(() => {
        iframe.src = DASHBOARDS[currentDashboard].url;
        lastEl.textContent = fmt(new Date());
      }, 900);

      nextRefreshTime = getNextRefreshTime();
      scheduleNext();
    }

    function scheduleNext() {
      const delay = Math.max(0, nextRefreshTime - Date.now());
      if (refreshTimer) clearTimeout(refreshTimer);
      refreshTimer = setTimeout(doRefresh, delay);
    }

    function tick() {
      const remaining = Math.max(0, nextRefreshTime - Date.now());
      const totalSec  = Math.floor(remaining / 1000);
      const mins      = Math.floor(totalSec / 60);
      const secs      = totalSec % 60;

      countdownEl.textContent =
        `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
      nextEl.textContent = fmt(nextRefreshTime);
    }

    lastEl.textContent = fmt(new Date());
    initDashboardFromHash();
    scheduleNext();
    setInterval(tick, 1000);
    tick();
    requestAnimationFrame(scaleIframe);
  </script>
</body>
</html>
