<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Coway Dashboard Monitor</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Sora:wght@300;500;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --blue: #1a6fb5;
      --dark: #0d1117;
      --bar-h: 28px;
    }

    /* Use 100dvh so it fills the true viewport on TVs / fullscreen browsers */
    html, body {
      width: 100%;
      height: 100dvh;
      overflow: hidden;
      background: var(--dark);
      font-family: 'Sora', sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    /* ── TOP BAR ── */
    .topbar {
      height: var(--bar-h);
      min-height: var(--bar-h);
      flex-shrink: 0;
      background: #111827;
      border-bottom: 1px solid #1e2d40;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      gap: 12px;
      /* prevent topbar from ever wrapping / overflowing */
      overflow: hidden;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .dot {
      width: 7px;
      height: 7px;
      flex-shrink: 0;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 6px #22c55e;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    .label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: #4b6484;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 14px;
      overflow: hidden;
    }

    .info-block {
      display: flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }

    .info-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: #4b6484;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .info-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: #7db8f0;
      font-weight: 600;
    }

    .countdown {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: #7db8f0;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .divider {
      width: 1px;
      height: 14px;
      background: #1e2d40;
      flex-shrink: 0;
    }

    /* Hide less-critical blocks on narrow screens */
    @media (max-width: 600px) {
      .hide-sm { display: none !important; }
    }
    @media (max-width: 400px) {
      .hide-xs { display: none !important; }
    }

    /* ── IFRAME WRAPPER ── */
    /*
     * flex: 1 means it takes all remaining height after the topbar.
     * We also set an explicit height fallback using calc() for browsers
     * that don't honor flex height properly in fullscreen mode.
     */
    .iframe-wrap {
      flex: 1 1 0;
      min-height: 0;           /* critical: lets flex children shrink below content size */
      position: relative;
      overflow: hidden;
      background: var(--dark);
      /* Explicit fallback height for environments that struggle with flex + dvh */
      height: calc(100dvh - var(--bar-h));
    }

    iframe {
      border: none;
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      /* width/height/transform set entirely by JS */
      transform-origin: top left;
      /* GPU-accelerated compositing layer — smoother rescales */
      will-change: transform;
    }

    /* ── FLASH OVERLAY ── */
    .flash {
      position: absolute;
      inset: 0;
      background: #0d1117;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s ease;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .flash.show {
      opacity: 1;
      pointer-events: all;
    }

    .flash-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: #2a4a6a;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.4s ease 0.3s;
    }

    .flash.show .flash-text {
      opacity: 1;
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-left">
      <div class="dot"></div>
      <span class="label">Coway Dashboard · Live Monitor</span>
    </div>

    <div class="topbar-right">
      <div class="info-block hide-xs">
        <span class="info-label">Last Refreshed</span>
        <span class="info-value" id="last-refreshed">—</span>
      </div>

      <div class="divider hide-xs"></div>

      <div class="info-block hide-sm">
        <span class="info-label">Next Refresh</span>
        <span class="info-value" id="next-refresh">—</span>
      </div>

      <div class="divider hide-sm"></div>

      <div class="info-block">
        <span class="info-label">Refresh In</span>
        <span class="countdown" id="countdown">—</span>
      </div>
    </div>
  </div>

  <div class="iframe-wrap" id="iframe-wrap">
    <div class="flash" id="flash">
      <span class="flash-text">Refreshing data...</span>
    </div>
    <iframe
      id="dashboard"
      src="https://lookerstudio.google.com/embed/reporting/b50b4471-1e49-4ca4-9762-9e9255dcd3e9/page/H8JrF"
      frameborder="0"
      style="border:0"
      allowfullscreen
      sandbox="allow-storage-access-by-user-activation allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox"
    ></iframe>
  </div>

  <script>
    // ── CONFIG ──────────────────────────────────────────
    const DASHBOARD_WIDTH  = 1220; // Looker Studio canvas width  (px)
    const DASHBOARD_HEIGHT = 775;  // Looker Studio canvas height (px)
    const DASHBOARD_RATIO  = DASHBOARD_WIDTH / DASHBOARD_HEIGHT;
    // ────────────────────────────────────────────────────

    const iframe      = document.getElementById('dashboard');
    const flashEl     = document.getElementById('flash');
    const wrapEl      = document.getElementById('iframe-wrap');
    const lastEl      = document.getElementById('last-refreshed');
    const nextEl      = document.getElementById('next-refresh');
    const countdownEl = document.getElementById('countdown');

    // ── DYNAMIC SCALE ────────────────────────────────────
    // Uses getBoundingClientRect for the most reliable pixel dimensions,
    // especially in fullscreen / TV kiosk mode.
    function scaleIframe() {
      const rect  = wrapEl.getBoundingClientRect();
      const wrapW = rect.width;
      const wrapH = rect.height;

      if (wrapW === 0 || wrapH === 0) return; // guard during hidden/init states

      const wrapRatio = wrapW / wrapH;

      let scale;
      if (wrapRatio > DASHBOARD_RATIO) {
        // Wrapper is wider than the dashboard aspect → constrain by height
        scale = wrapH / DASHBOARD_HEIGHT;
      } else {
        // Wrapper is taller than the dashboard aspect → constrain by width
        scale = wrapW / DASHBOARD_WIDTH;
      }

      const scaledW = DASHBOARD_WIDTH  * scale;
      const scaledH = DASHBOARD_HEIGHT * scale;

      // Center horizontally and vertically inside the wrapper
      const offsetX = (wrapW - scaledW) / 2;
      const offsetY = (wrapH - scaledH) / 2;

      iframe.style.width     = DASHBOARD_WIDTH  + 'px';
      iframe.style.height    = DASHBOARD_HEIGHT + 'px';
      iframe.style.transform =
        `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
    }

    // ResizeObserver fires whenever the wrapper itself changes size
    // (window resize, orientation change, browser chrome show/hide, fullscreen toggle)
    const ro = new ResizeObserver(() => scaleIframe());
    ro.observe(wrapEl);

    // Fallback for browsers without ResizeObserver support
    window.addEventListener('resize', scaleIframe);

    // Initial scale — defer one frame so layout is committed
    requestAnimationFrame(scaleIframe);

    // ── TIME HELPERS ──────────────────────────────────────
    function fmt(date) {
      return date.toLocaleTimeString('id-ID', {
        hour: '2-digit', minute: '2-digit', second: '2-digit'
      });
    }

    function getNextRefreshTime() {
      const now  = new Date();
      const next = new Date(now);
      const m    = now.getMinutes();

      if (m < 10) {
        next.setMinutes(10, 0, 0);
      } else if (m < 40) {
        next.setMinutes(40, 0, 0);
      } else {
        next.setHours(next.getHours() + 1);
        next.setMinutes(10, 0, 0);
      }
      return next;
    }

    let nextRefreshTime = getNextRefreshTime();

    // ── REFRESH LOGIC ─────────────────────────────────────
    function doRefresh() {
      flashEl.classList.add('show');

      setTimeout(() => {
        iframe.src = iframe.src;
        lastEl.textContent = fmt(new Date());
      }, 900);

      iframe.onload = () => {
        setTimeout(() => {
          flashEl.classList.remove('show');
          scaleIframe();
        }, 500);
      };

      nextRefreshTime = getNextRefreshTime();
      scheduleNext();
    }

    function scheduleNext() {
      const delay = Math.max(0, nextRefreshTime - Date.now());
      setTimeout(doRefresh, delay);
    }

    // ── COUNTDOWN TICK ────────────────────────────────────
    function tick() {
      const remaining = Math.max(0, nextRefreshTime - Date.now());
      const totalSec  = Math.floor(remaining / 1000);
      const mins      = Math.floor(totalSec / 60);
      const secs      = totalSec % 60;

      countdownEl.textContent =
        `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
      nextEl.textContent = fmt(nextRefreshTime);
    }

    // ── INIT ──────────────────────────────────────────────
    lastEl.textContent = fmt(new Date());
    scheduleNext();
    setInterval(tick, 1000);
    tick();
  </script>
</body>
</html>
